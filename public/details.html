<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Деталі житла - SmartStay</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-logo"><a href="/">SmartStay</a></div>
    
        <div class="nav-links">
            <a href="/search">Пошук житла</a>
            <a href="/profile">Профіль</a>
            <a href="/login">Вийти</a>
        </div>
    </nav>

    <div class="container detail-container">
        <div id="apartment-gallery" class="gallery">
            <div class="main-photo-wrapper">
                <img id="main-photo" src="" alt="Головне фото">
            </div>
            <div id="thumbnails" class="thumbnails">
                </div>
        </div>

        <div class="info-section">
            <h1 id="apt-title">Завантаження...</h1>
            <p class="address"><b id="apt-city"></b>,
                 <span id="apt-address"></span></p>
            
            <div class="rating-badge">Оцінка: <span id="apt-rating"></span> / 10</div>

            <div class="description-block">
                <h3>Про це житло</h3>
                <p id="apt-description"></p>
            </div>

            <div class="amenities-block">
                <h3>Зручності</h3>
                <ul id="amenities-list">
                    </ul>
            </div>

            <div class="booking-card">
                <p class="price"><span id="apt-price"></span><span> грн </span><span>/ ніч</span></p>
               <button id="btn-book-apartment" class="btn">Забронювати житло</button>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">
                <a href="/">SmartStay</a>
            </div>
            <p class="footer-text">&copy; 2026 Комфортне житло для кожного </p>
            <div class="footer-links">
                <a href="https://github.com/SmartStayy/SmartStay" target="_blank" class="footer-github-link">
                    <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                    GitHub Проєкта
                </a>
            </div>
        </div>
    </footer>

    <button id="btn-scroll-top" class="scroll-to-top" aria-label="Повернутися нагору">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" class="modal-title">Заголовок</h3>
            <p id="modal-text" class="modal-text">Текст повідомлення</p>
            <div class="modal-actions">
                <button id="modal-btn-no" class="btn btn-danger-outline">Скасувати</button>
                <button id="modal-btn-yes" class="btn">Так</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const scrollTopBtn = document.getElementById('btn-scroll-top');
            if (!scrollTopBtn) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    scrollTopBtn.classList.add('show');
                } else {
                    scrollTopBtn.classList.remove('show');
                }
            });

            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        })();
    </script>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
